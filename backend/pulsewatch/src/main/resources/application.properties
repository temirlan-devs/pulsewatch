spring.application.name=pulsewatch

spring.datasource.url=jdbc:postgresql://localhost:5432/pulsewatch
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

pulsewatch.alert.cooldown-ms=30000
pulsewatch.freshness-threshold-minutes=5
pulsewatch.insights.log-window-multiplier=3
pulsewatch.insights.log-limit=100